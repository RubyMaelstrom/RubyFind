# RubyFind — nginx config (lua-nginx-module)
# Deploy to your nginx server and reload: nginx -s reload
#
# Prerequisites:
#   - nginx compiled with --with-http_lua_module (or nginx-extras package)
#   - lua-resty-core installed (usually bundled with lua-nginx-module)

# IN THE HTTP CONTEXT (outside server block), add:
#   lua_package_path '/etc/nginx/lua/RubyFind/?.lua;;';

# Then include this file from your server block or paste its contents.

server {
    listen 80;
    server_name <your server name>;

    # DNS resolver for Lua cosockets
    resolver 8.8.8.8 8.8.4.4 ipv6=off;
    resolver_timeout 5s;

    # --- Lua package path (modules live in RubyFind/)
    lua_package_path '/etc/nginx/lua/RubyFind/?.lua;;';

    # --- Pre-load modules at startup
    init_by_lua_block {
        -- Nothing to pre-load; all modules are loaded per-request
    }

    # --- Main page / search results
    location /search {
        content_by_lua_file /etc/nginx/lua/RubyFind/handlers/index.lua;
    }

    # --- Article reader proxy
    location /search/read {
        content_by_lua_file /etc/nginx/lua/RubyFind/handlers/read.lua;
    }

    # --- Error pages (fallback)
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
